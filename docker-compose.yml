version: '3.8'

services:
  web:
    build: .
    ports:
      - "80:80"
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80

  websocket-server:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm start"
    environment:
      - PORT=3000

networks:
  default:
    name: tic-tac-toe-network
