<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe - AI Challenge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 Tic Tac Toe</h1>
            <p class="subtitle">Challenge the AI</p>
        </div>

        <div class="stats">
            <div class="stat-box player-stats">
                <div class="stat-label">Player X</div>
                <div class="stat-value" id="playerScore">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Draw</div>
                <div class="stat-value" id="drawScore">0</div>
            </div>
            <div class="stat-box ai-stats">
                <div class="stat-label" id="playerOLabel">AI (O)</div>
                <div class="stat-value" id="aiScore">0</div>
            </div>
        </div>

        <div class="mode">
            <label for="gameMode">Mode:</label>
            <select id="gameMode">
                <option value="ai">Play vs AI</option>
                <option value="multiplayer">Local Multiplayer</option>
                <option value="remote">Remote Multiplayer</option>
            </select>
        </div>

        <div class="game-container">
            <div class="board" id="board">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>
        </div>

        <div class="game-status">
            <div class="status-text" id="status">Your Turn!</div>
        </div>

        <div class="button-group">
            <button class="btn btn-primary" id="resetBtn">New Game</button>
            <button class="btn btn-secondary" id="resetScoreBtn">Reset Score</button>
        </div>

        <div class="remote-panel hidden" id="remotePanel">
            <div class="network-row">
                <label for="serverUrl">WebSocket Server</label>
                <input id="serverUrl" type="text" value="ws://localhost:3000" placeholder="ws://server.example:3000">
            </div>
            <div class="network-row">
                <label for="roomIdInput">Room ID</label>
                <input id="roomIdInput" type="text" placeholder="Enter room code">
            </div>
            <div class="button-group network-actions">
                <button class="btn btn-primary" id="createRoomBtn">Create Room</button>
                <button class="btn btn-secondary" id="joinRoomBtn">Join Room</button>
            </div>
            <div class="connection-status" id="connectionStatus">Not connected</div>
            <div class="room-note">Use a public WebSocket address to play from remote locations.</div>
        </div>

        <div class="difficulty">
            <label for="difficulty">Difficulty:</label>
            <select id="difficulty">
                <option value="hard">Hard (Unbeatable)</option>
                <option value="medium">Medium (Smart)</option>
                <option value="easy">Easy (Random)</option>
            </select>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
